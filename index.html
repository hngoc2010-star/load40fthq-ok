<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>54CBM Quote</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>54CBM Quote</h1>

      <div class="grid">
        <div class="field">
          <label for="thicknessSell">Thickness</label>
          <input type="number" id="thicknessSell" step="0.1" placeholder="mm" />
        </div>

        <div class="field">
          <label for="sheets">Sheets</label>
          <input type="number" id="sheets" step="1" placeholder="pcs" />
        </div>

        <div class="field">
          <label for="width">Width</label>
          <input type="number" id="width" step="1" placeholder="mm" />
        </div>

        <div class="field">
          <label for="length">Length</label>
          <input type="number" id="length" step="1" placeholder="mm" />
        </div>

        <div class="field">
          <label for="cbmPerBundle">CBM/Bundle</label>
          <input type="number" id="cbmPerBundle" step="0.001" placeholder="cbm" />
        </div>

        <div class="field">
          <label for="bundleCount">Bundles</label>
          <select id="bundleCount">
            <option value="1">1 bundle</option>
            <option value="2">2 bundles</option>
            <option value="3">3 bundles</option>
            <option value="4">4 bundles</option>
            <option value="5">5 bundles</option>
            <option value="6">6 bundles</option>
            <option value="7">7 bundles</option>
            <option value="8">8 bundles</option>
            <option value="9">9 bundles</option>
            <option value="10">10 bundles</option>
          </select>
        </div>

        <div class="field">
          <label for="corePerBundle">Core/Bundle</label>
          <input type="number" id="corePerBundle" step="1" placeholder="pcs" />
        </div>

        <div class="field">
          <label for="thicknessMm">Thickness mm</label>
          <input type="number" id="thicknessMm" step="0.01" placeholder="mm" />
        </div>

        <div class="field full">
          <label for="optionType">Option</label>
          <select id="optionType">
            <option value="54">Max 54 CBM</option>
            <option value="custom">Custom CBM</option>
          </select>
        </div>

        <div class="field full hidden" id="customCbmWrap">
          <label for="customCbm">Custom CBM</label>
          <input type="number" id="customCbm" step="0.1" placeholder="Enter CBM limit" />
        </div>
      </div>

      <div class="result">
        <div class="result-row">
          <span>Total CBM</span>
          <strong id="totalCbm">0.000</strong>
        </div>
        <div class="result-row">
          <span>Bundle Height</span>
          <strong id="bundleHeight">0.00 mm</strong>
        </div>
        <div class="result-row">
          <span>Status</span>
          <strong id="statusText">Waiting input</strong>
        </div>
      </div>

      <div class="actions">
        <button id="calcBtn">Calculate</button>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
